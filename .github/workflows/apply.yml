name: Apply (manual — make up)

# Manual-only: never auto-runs. Apply is a human action per ADR 0002.
# Trigger from the Actions tab: "Run workflow" -> choose branch (typically main).
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "APPLY" to confirm. Anything else aborts.'
        required: true
        type: string
      backend_image_tag:
        description: 'Backend image tag (default: latest)'
        required: false
        type: string
        default: 'latest'

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.7.5'
  AWS_REGION: ca-central-1
  TF_IN_AUTOMATION: 'true'

jobs:
  apply:
    name: terraform apply (phase0)
    runs-on: ubuntu-latest
    environment: phase0   # gates on environment protection rules if configured

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "APPLY" ]; then
            echo "::error::Confirmation string was '${{ inputs.confirm }}', expected 'APPLY'. Aborting."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: infra/environments/phase0
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: infra/environments/phase0
        run: |
          terraform apply \
            -input=false \
            -auto-approve \
            -var "backend_image_tag=${{ inputs.backend_image_tag }}"

      - name: Print stack endpoints
        working-directory: infra/environments/phase0
        run: |
          echo "## Stack endpoints" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform output >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
