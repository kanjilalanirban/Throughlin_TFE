name: Destroy (manual — make down)

# Manual-only: never auto-runs. Trigger from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY" to confirm. Anything else aborts.'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.7.5'
  AWS_REGION: ca-central-1
  TF_IN_AUTOMATION: 'true'

jobs:
  destroy:
    name: terraform destroy (phase0)
    runs-on: ubuntu-latest
    environment: phase0

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DESTROY" ]; then
            echo "::error::Confirmation string was '${{ inputs.confirm }}', expected 'DESTROY'. Aborting."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: infra/environments/phase0
        run: terraform init -input=false

      - name: Terraform destroy
        working-directory: infra/environments/phase0
        run: terraform destroy -input=false -auto-approve

      - name: Stack destroyed
        run: |
          echo "## Stack destroyed" >> $GITHUB_STEP_SUMMARY
          echo "All ephemeral resources removed. Bootstrap (state bucket, ECR, IAM, OIDC, secrets) is untouched." >> $GITHUB_STEP_SUMMARY
